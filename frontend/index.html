<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>RoboMunch — Art Studio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="app">

    <!-- HEADER -->
    <header class="header">
      <h1 class="logo"><span class="logo-robo">ROBO</span><span class="logo-munch">MUNCH</span></h1>
      <img class="avatar" src="assets/munch.svg" alt="Edvard Munch" />
    </header>

    <h2 class="section-title">Art Studio</h2>

    <!-- IMAGE OUTPUT -->
    <div class="image-box" id="image-box">
      <img id="output-image" alt="" />
      <div class="spinner" id="image-spinner" hidden></div>
    </div>

    <!-- PROMPT INPUT + PAINT BUTTON -->
    <div class="pill prompt-pill">
      <input id="prompt-input" type="text" placeholder="Type your prompt here." />
      <button id="paint-btn" class="circle-btn" title="Paint" aria-label="Paint">
        <!-- palette icon -->
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 2a10 10 0 1 0 0 20 2 2 0 0 0 0-4 2 2 0 0 1-2-2 2 2 0 0 1 2-2h3a5 5 0 0 0 5-5 9 9 0 0 0-8-7z"/>
          <circle cx="7.5" cy="10.5" r="1.2"/>
          <circle cx="10.5" cy="6.5" r="1.2"/>
          <circle cx="15.5" cy="6.5" r="1.2"/>
          <circle cx="18.5" cy="10.5" r="1.2"/>
        </svg>
      </button>
    </div>

    <h2 class="section-title">Chat Studio</h2>

    <!-- CHAT OUTPUT -->
    <div class="chat-box" id="chat-output"></div>

    <!-- CHAT INPUT ROW -->
    <div class="chat-input-row">
      <button id="mic-btn" class="circle-btn mic" title="Voice input" aria-label="Voice input">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="9" y="3" width="6" height="12" rx="3"/>
          <path d="M5 11a7 7 0 0 0 14 0"/>
          <line x1="12" y1="18" x2="12" y2="22"/>
          <line x1="8" y1="22" x2="16" y2="22"/>
        </svg>
      </button>

      <div class="pill chat-pill">
        <input id="chat-input" type="text" placeholder="Type your message here." />
        <button id="send-btn" class="circle-btn small" title="Send" aria-label="Send">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M22 2L11 13"/>
            <path d="M22 2l-7 20-4-9-9-4z"/>
          </svg>
        </button>
      </div>
    </div>

  </main>

  <script src="app.js"></script>
</body>
</html>
